name: Setup NPM Packages
description: Setup required NPM packages with caching for pnpm
runs:
  using: composite
  steps:
  - name: Setup Tools
    uses: egose/actions/pnpm-packages@25fa7e841dfc761ef55e85b9312299939c700ac9
    with:
      frozen: 'true'
      ignore-scripts: 'true'
      paths: |
        .
        website
